name: Deploy Orion Chat Web

on:
  push:
    branches:
      - develop #staging
      - main #production
jobs:
    deploy:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: .

        steps:
            # 1. checkout code
            - name: Checkout
              uses: actions/checkout@v3

            # 2. build bằng docker
            - name: Build Docker image
              run: |
                docker build -t orion-chat-web \
                  --build-arg VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}" \
                  --build-arg VITE_SOCKET_URL="${{ github.ref == 'refs/heads/main' && (secrets.VITE_SOCKET_URL_PROD || secrets.VITE_SOCKET_URL) || (secrets.VITE_SOCKET_URL_STAGING || secrets.VITE_SOCKET_URL) }}" \
                  --build-arg VITE_API_BASE_URL="${{ github.ref == 'refs/heads/main' && (secrets.VITE_API_BASE_URL_PROD || secrets.VITE_API_BASE_URL) || (secrets.VITE_API_BASE_URL_STAGING || secrets.VITE_API_BASE_URL) }}" \
                  --build-arg VITE_API_URL="${{ github.ref == 'refs/heads/main' && (secrets.VITE_API_URL_PROD || secrets.VITE_API_URL) || (secrets.VITE_API_URL_STAGING || secrets.VITE_API_URL) }}" \
                  --build-arg VITE_TURN_URLS="${{ secrets.VITE_TURN_URLS }}" \
                  --build-arg VITE_TURN_USERNAME="${{ secrets.VITE_TURN_USERNAME }}" \
                  --build-arg VITE_TURN_CREDENTIAL="${{ secrets.VITE_TURN_CREDENTIAL }}" \
                  --build-arg VITE_FORCE_TURN_RELAY="${{ secrets.VITE_FORCE_TURN_RELAY }}" \
                  --build-arg VITE_ENABLE_STREAM_VIDEO="${{ secrets.VITE_ENABLE_STREAM_VIDEO }}" \
                  --build-arg VITE_MEDIA_BASE_URL="${{ secrets.VITE_MEDIA_BASE_URL }}" \
                  .

            - name: Extract dist
              run: |
                    docker create --name temp orion-chat-web
                    docker cp temp:/app/dist ./dist
                    docker rm temp

            # 3. setup aws
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ap-southeast-1

            # staging
            - name: Deploy to S3 (staging)
              if: github.ref == 'refs/heads/develop'
              run: |
                aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET_STAGING }} --delete

            - name: Invalidate CloudFront (staging)
              if: github.ref == 'refs/heads/develop'
              run: |
                aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_STAGING }} \
                    --paths "/*"

            # production
            - name: Deploy to S3 (prod)
              if: github.ref == 'refs/heads/main'
              run: |
                aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET_PROD }} \
                  --delete \
                  --cache-control "public, max-age=31536000" \

            - name: Invalidate CloudFront (prod)
              if: github.ref == 'refs/heads/main'
              run: |
                aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_PROD }} \
                    --paths "/*"